// ─── Helpers ──────────────────────────────────────────────────────────────────
function zilePanaLa(dateStr) {
  const azi = new Date(); azi.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - azi) / (1000*60*60*24));
}
function statusDoc(dateStr) {
  const z = zilePanaLa(dateStr);
  if (z < 0) return { label: 'Expirat', cls: 'badge-red' };
  if (z <= 30) return { label: `${z} zile`, cls: 'badge-yellow' };
  return { label: `${z} zile`, cls: 'badge-green' };
}
function formatDate(d) {
  if (!d) return '—';
  const [y, m, zi] = d.split('-');
  return `${zi}.${m}.${y}`;
}
const DOC_ICONS = { ITP: '🔧', RCA: '🛡️', CASCO: '🔒', Rovinieta: '🛣️', 'Permis auto': '📋', Altele: '📄' };

function saveData(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
function loadData(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e){ return def; } }

// ─── AUTH SCREENS ─────────────────────────────────────────────────────────────
function AuthScreen({ onLogin }) {
  const [mode, setMode] = useState('login'); // login | register
  const [form, setForm] = useState({ nume: '', email: '', parola: '', confirma: '' });
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleLogin() {
    setErr(''); setLoading(true);
    try {
      const {data, error} = await sb.auth.signInWithPassword({email: form.email, password: form.parola});
      if (error) throw error;
      onLogin(data.user);
    } catch(e) {
      setErr(e.message === 'Invalid login credentials' ? 'Email sau parolă greșite' : e.message);
    }
    setLoading(false);
  }

  async function handleRegister() {
    setErr('');
    if (!form.nume.trim()) return setErr('Introdu numele');
    if (!form.email.includes('@')) return setErr('Email invalid');
    if (form.parola.length < 6) return setErr('Parola min. 6 caractere');
    if (form.parola !== form.confirma) return setErr('Parolele nu coincid');
    setLoading(true);
    try {
      const {data, error} = await sb.auth.signUp({
        email: form.email, password: form.parola,
        options: {data: {nume: form.nume}}
      });
      if (error) throw error;
      if (data.user) onLogin(data.user);
      else setErr('Verifică emailul pentru confirmare cont');
    } catch(e) { setErr(e.message); }
    setLoading(false);
  }

  return (
    <div className="app-container min-h-screen flex flex-col">
      {/* Hero */}
      <div className="bg-blue-600 px-6 pt-12 pb-10 text-white text-center">
        <div className="text-5xl mb-3">🚗</div>
        <h1 className="text-3xl font-bold">AutoCare</h1>
        <p className="text-blue-200 mt-2 text-sm">Gestionează mașina ta cu ușurință</p>
      </div>

      {/* Form */}
      <div className="flex-1 px-6 py-8">
        {/* Tabs */}
        <div className="flex bg-gray-100 rounded-2xl p-1 mb-6">
          <button onClick={() => { setMode('login'); setErr(''); }} className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${mode === 'login' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>Autentificare</button>
          <button onClick={() => { setMode('register'); setErr(''); }} className={`flex-1 py-2.5 rounded-xl text-sm font-semibold transition-all ${mode === 'register' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>Cont nou</button>
        </div>

        {err && <div className="bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl mb-4">{err}</div>}

        <div className="space-y-3">
          {mode === 'register' && (
            <input value={form.nume} onChange={e => setForm({...form, nume: e.target.value})} placeholder="Nume complet" className="w-full border border-gray-200 rounded-xl p-3.5 text-sm" />
          )}
          <input value={form.email} onChange={e => setForm({...form, email: e.target.value})} placeholder="Adresă email" type="email" className="w-full border border-gray-200 rounded-xl p-3.5 text-sm" />
          <input value={form.parola} onChange={e => setForm({...form, parola: e.target.value})} placeholder="Parolă" type="password" className="w-full border border-gray-200 rounded-xl p-3.5 text-sm" />
          {mode === 'register' && (
            <input value={form.confirma} onChange={e => setForm({...form, confirma: e.target.value})} placeholder="Confirmă parola" type="password" className="w-full border border-gray-200 rounded-xl p-3.5 text-sm" />
          )}
        </div>

        <button onClick={mode === 'login' ? handleLogin : handleRegister} disabled={loading} className="mt-5 w-full bg-blue-600 disabled:bg-blue-400 text-white py-3.5 rounded-xl font-semibold text-sm shadow-lg shadow-blue-200">
          {loading ? 'Se încarcă...' : (mode === 'login' ? 'Intră în cont' : 'Creează contul')}
        </button>

        {mode === 'login' && (
          <p className="text-center text-xs text-gray-400 mt-4">
            Nu ai cont? <button onClick={() => { setMode('register'); setErr(''); }} className="text-blue-600 font-medium">Înregistrează-te</button>
          </p>
        )}
      </div>
    </div>
  );
}

// ─── MODAL ADAUGA MASINA ───────────────────────────────────────────────────────
function ModalMasina({ onClose, onSave }) {
  const [form, setForm] = useState({ marca: '', model: '', an: '', km: '', numar: '', culoare: '#3B82F6', combustibil: 'Benzina' });
  const CULORI = ['#3B82F6','#EF4444','#10B981','#F59E0B','#8B5CF6','#EC4899','#1F2937','#FFFFFF'];
  const COMBUSTIBIL = ['Benzina','Motorina','Hibrid','Hibrid plug-in','Electric','GPL','CNG'];
  const modele = form.marca ? CAR_BRANDS[form.marca] || [] : [];

  function salveaza() {
    if (!form.marca || !form.model || !form.numar) return;
    onSave({ id: Date.now(), ...form, an: parseInt(form.an) || new Date().getFullYear(), km: parseInt(form.km) || 0 });
    onClose();
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-5">
          <h2 className="text-lg font-bold text-gray-800">Adaugă mașină</h2>
          <button onClick={onClose} className="text-gray-400 text-xl w-8 h-8 flex items-center justify-center">✕</button>
        </div>
        <div className="space-y-3">
          {/* Marca */}
          <div>
            <label className="text-xs text-gray-500 mb-1 block font-medium">Marcă *</label>
            <select value={form.marca} onChange={e => setForm({...form, marca: e.target.value, model: ''})} className="w-full border border-gray-200 rounded-xl p-3 text-sm bg-white">
              <option value="">Selectează marca</option>
              {MARCI.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          {/* Model */}
          <div>
            <label className="text-xs text-gray-500 mb-1 block font-medium">Model *</label>
            <select value={form.model} onChange={e => setForm({...form, model: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3 text-sm bg-white" disabled={!form.marca}>
              <option value="">{form.marca ? 'Selectează modelul' : 'Alege mai întâi marca'}</option>
              {modele.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          {/* An + Km */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-gray-500 mb-1 block font-medium">An fabricație</label>
              <select value={form.an} onChange={e => setForm({...form, an: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3 text-sm bg-white">
                <option value="">An</option>
                {ANI.map(a => <option key={a} value={a}>{a}</option>)}
              </select>
            </div>
            <div>
              <label className="text-xs text-gray-500 mb-1 block font-medium">Kilometraj</label>
              <input value={form.km} onChange={e => setForm({...form, km: e.target.value})} placeholder="ex: 85000" type="number" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
            </div>
          </div>
          {/* Numar + Combustibil */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="text-xs text-gray-500 mb-1 block font-medium">Nr. înmatriculare *</label>
              <input value={form.numar} onChange={e => setForm({...form, numar: e.target.value.toUpperCase()})} placeholder="B 123 ABC" className="border border-gray-200 rounded-xl p-3 text-sm w-full" />
            </div>
            <div>
              <label className="text-xs text-gray-500 mb-1 block font-medium">Combustibil</label>
              <select value={form.combustibil} onChange={e => setForm({...form, combustibil: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3 text-sm bg-white">
                {COMBUSTIBIL.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
            </div>
          </div>
          {/* Culoare */}
          <div>
            <label className="text-xs text-gray-500 mb-2 block font-medium">Culoare etichetă</label>
            <div className="flex gap-2">
              {CULORI.map(c => (
                <button key={c} onClick={() => setForm({...form, culoare: c})} className="w-8 h-8 rounded-full border-2 transition-all" style={{background: c, borderColor: form.culoare === c ? '#2563EB' : '#E5E7EB'}} />
              ))}
            </div>
          </div>
        </div>
        <button onClick={salveaza} disabled={!form.marca || !form.model || !form.numar} className="mt-5 w-full bg-blue-600 disabled:bg-gray-200 disabled:text-gray-400 text-white py-3.5 rounded-xl font-semibold text-sm">
          Adaugă mașina
        </button>
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({ cars, docs, services, user, onTab }) {
  const urgent = docs.filter(d => zilePanaLa(d.expira) <= 30);
  const expirate = docs.filter(d => zilePanaLa(d.expira) < 0);

  return (
    <div className="content p-4">
      <div className="flex items-center justify-between mb-6 pt-2">
        <div>
          <h1 className="text-2xl font-bold text-gray-800">Auto Care</h1>
          <p className="text-sm text-gray-500">Bună ziua, {user.nume} 👋</p>
        </div>
        <div className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold">{user.nume[0].toUpperCase()}</div>
      </div>

      <div className="grid grid-cols-3 gap-3 mb-6">
        <div className="card p-3 text-center"><div className="text-2xl font-bold text-blue-600">{cars.length}</div><div className="text-xs text-gray-500 mt-1">Mașini</div></div>
        <div className="card p-3 text-center"><div className="text-2xl font-bold text-red-500">{expirate.length}</div><div className="text-xs text-gray-500 mt-1">Expirate</div></div>
        <div className="card p-3 text-center"><div className="text-2xl font-bold text-yellow-500">{Math.max(0, urgent.length - expirate.length)}</div><div className="text-xs text-gray-500 mt-1">Urgente</div></div>
      </div>

      {urgent.length > 0 && (
        <div className="mb-6">
          <h2 className="text-sm font-semibold text-gray-600 mb-2 uppercase tracking-wide">⚠️ Necesită atenție</h2>
          <div className="space-y-2">
            {[...docs].filter(d => zilePanaLa(d.expira) <= 30).sort((a,b) => zilePanaLa(a.expira) - zilePanaLa(b.expira)).map(doc => {
              const car = cars.find(c => c.id === doc.carId);
              const st = statusDoc(doc.expira);
              return (
                <div key={doc.id} className="card p-3 flex items-center gap-3">
                  <div className="text-2xl">{DOC_ICONS[doc.tip] || '📄'}</div>
                  <div className="flex-1">
                    <div className="font-medium text-gray-800">{doc.tip}</div>
                    <div className="text-xs text-gray-500">{car?.marca} {car?.model} · {car?.numar}</div>
                  </div>
                  <span className={`text-xs font-semibold px-2 py-1 rounded-full ${st.cls}`}>{st.label}</span>
                </div>
              );
            })}
          </div>
        </div>

// ── Masini ────────────────────────────────────────────────────────────────────
function Masini({ cars, setCars, docs, setDocs }) {
  const [modal, setModal] = useState(false);
  const [detaliu, setDetaliu] = useState(null);

  function stergeMasina(id) {
    setCars(cars.filter(c => c.id !== id));
    setDocs(docs.filter(d => d.carId !== id));
    setDetaliu(null);
  }

  return (
    <div className="content p-4">
      <div className="flex items-center justify-between mb-6 pt-2">
        <h1 className="text-xl font-bold text-gray-800">🚗 Mașinile mele</h1>
        <button onClick={() => setModal(true)} className="bg-blue-600 text-white text-sm font-semibold px-4 py-2 rounded-xl">+ Adaugă</button>
      </div>

      {cars.length === 0 ? (
        <div className="card p-10 text-center text-gray-400">
          <div className="text-5xl mb-3">🚗</div>
          <p className="mb-4">Nu ai adăugat nicio mașină</p>
          <button onClick={() => setModal(true)} className="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-semibold">Adaugă prima mașină</button>
        </div>
      ) : cars.map(car => {
        const carDocs = docs.filter(d => d.carId === car.id);
        const exp = carDocs.filter(d => zilePanaLa(d.expira) < 0).length;
        const urg = carDocs.filter(d => zilePanaLa(d.expira) >= 0 && zilePanaLa(d.expira) <= 30).length;
        return (
          <div key={car.id} className="card p-4 mb-3 cursor-pointer" onClick={() => setDetaliu(car)}>
            <div className="flex items-center gap-3">
              <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-3xl" style={{background: car.culoare + '20'}}>🚗</div>
              <div className="flex-1">
                <div className="font-bold text-gray-800 text-base">{car.marca} {car.model}</div>
                <div className="text-sm text-gray-500">{car.numar} · {car.an}</div>
                <div className="text-xs text-gray-400">{car.combustibil} · {car.km?.toLocaleString()} km</div>
                <div className="flex gap-2 mt-1.5">
                  {exp > 0 && <span className="badge-red text-xs px-2 py-0.5 rounded-full font-medium">{exp} expirate</span>}
                  {urg > 0 && <span className="badge-yellow text-xs px-2 py-0.5 rounded-full font-medium">{urg} urgente</span>}
                  {exp === 0 && urg === 0 && <span className="badge-green text-xs px-2 py-0.5 rounded-full font-medium">✓ Totul OK</span>}
                </div>
              </div>
              <div className="text-gray-300 text-2xl">›</div>
            </div>
          </div>
        );
      })}

      {modal && <ModalMasina onClose={() => setModal(false)} onSave={car => setCars([...cars, car])} />}

      {detaliu && (
        <div className="modal-overlay" onClick={() => setDetaliu(null)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h2 className="text-lg font-bold text-gray-800">{detaliu.marca} {detaliu.model}</h2>
              <button onClick={() => setDetaliu(null)} className="text-gray-400 text-xl">✕</button>
            </div>
            <div className="bg-gray-50 rounded-xl p-4 mb-4 space-y-2 text-sm">
              <div className="flex justify-between"><span className="text-gray-500">Număr</span><span className="font-medium">{detaliu.numar}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">An fabricație</span><span className="font-medium">{detaliu.an}</span></div>
              <div className="flex justify-between"><span className="text-gray-500">Kilometraj</span><span className="font-medium">{detaliu.km?.toLocaleString()} km</span></div>
              <div className="flex justify-between"><span className="text-gray-500">Combustibil</span><span className="font-medium">{detaliu.combustibil}</span></div>
            </div>
            <h3 className="text-sm font-semibold text-gray-600 mb-2">Documente</h3>
            {docs.filter(d => d.carId === detaliu.id).length === 0
              ? <p className="text-sm text-gray-400 mb-4">Niciun document adăugat</p>
              : docs.filter(d => d.carId === detaliu.id).map(doc => {
                  const st = statusDoc(doc.expira);
                  return (
                    <div key={doc.id} className="flex items-center gap-2 mb-2">
                      <span className="text-lg">{DOC_ICONS[doc.tip]}</span>
                      <span className="text-sm flex-1 text-gray-700">{doc.tip}</span>
                      <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${st.cls}`}>{st.label}</span>
                    </div>
                  );
                })}
            <button onClick={() => stergeMasina(detaliu.id)} className="mt-4 w-full border border-red-300 text-red-500 py-2.5 rounded-xl text-sm font-medium">Șterge mașina</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Documente ─────────────────────────────────────────────────────────────────
function Documente({ docs, setDocs, cars }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ carId: '', tip: 'ITP', expira: '', emis: '', nota: '' });
  const TIPURI = ['ITP','RCA','CASCO','Rovinieta','Permis auto','Altele'];

  function adauga() {
    if (!form.carId || !form.expira) return;
    setDocs([...docs, { id: Date.now(), ...form, carId: parseInt(form.carId) }]);
    setForm({ carId:'', tip:'ITP', expira:'', emis:'', nota:'' });
    setModal(false);
  }

  const sorted = [...docs].sort((a,b) => zilePanaLa(a.expira) - zilePanaLa(b.expira));

  return (
    <div className="content p-4">
      <div className="flex items-center justify-between mb-6 pt-2">
        <h1 className="text-xl font-bold text-gray-800">📄 Documente</h1>
        <button onClick={() => setModal(true)} disabled={cars.length === 0} className="bg-blue-600 disabled:bg-gray-200 disabled:text-gray-400 text-white text-sm font-semibold px-4 py-2 rounded-xl">+ Adaugă</button>
      </div>

      {cars.length === 0 && <div className="card p-6 text-center text-gray-400 text-sm mb-4">Adaugă mai întâi o mașină.</div>}

      {sorted.length === 0 && cars.length > 0 ? (
        <div className="card p-10 text-center text-gray-400">
          <div className="text-5xl mb-3">📄</div>
          <p className="mb-4">Nu ai adăugat niciun document</p>
          <button onClick={() => setModal(true)} className="bg-blue-600 text-white px-6 py-2 rounded-xl text-sm font-semibold">Adaugă document</button>
        </div>
      ) : sorted.map(doc => {
        const car = cars.find(c => c.id === doc.carId);
        const st = statusDoc(doc.expira);
        return (
          <div key={doc.id} className="card p-4 mb-3">
            <div className="flex items-center gap-3">
              <div className="text-3xl">{DOC_ICONS[doc.tip] || '📄'}</div>
              <div className="flex-1">
                <div className="font-bold text-gray-800">{doc.tip}</div>
                <div className="text-xs text-gray-500">{car?.marca} {car?.model} · {car?.numar}</div>
                <div className="text-xs text-gray-400 mt-0.5">Expiră: {formatDate(doc.expira)}{doc.nota ? ` · ${doc.nota}` : ''}</div>
              </div>
              <div className="flex flex-col items-end gap-2">
                <span className={`text-xs font-semibold px-2 py-1 rounded-full ${st.cls}`}>{st.label}</span>
                <button onClick={() => setDocs(docs.filter(d => d.id !== doc.id))} className="text-xs text-red-400">🗑️</button>
              </div>
            </div>
          </div>
        );
      })}

      {modal && (
        <div className="modal-overlay" onClick={() => setModal(false)}>
          <div className="modal-box" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5">
              <h2 className="text-lg font-bold text-gray-800">Adaugă document</h2>
              <button onClick={() => setModal(false)} className="text-gray-400 text-xl">✕</button>
            </div>
            <div className="space-y-3">
              <div>
                <label className="text-xs text-gray-500 mb-1 block font-medium">Mașina *</label>
                <select value={form.carId} onChange={e => setForm({...form, carId: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3 text-sm bg-white">
                  <option value="">Selectează mașina</option>
                  {cars.map(c => <option key={c.id} value={c.id}>{c.marca} {c.model} · {c.numar}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs text-gray-500 mb-1 block font-medium">Tip document *</label>
                <select value={form.tip} onChange={e => setForm({...form, tip: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3 text-sm bg-white">
                  {TIPURI.map(t => <option key={t} value={t}>{DOC_ICONS[t]} {t}</option>)}
                </select>
              </div>
              <div>
                <label className="text-xs text-gray-500 mb-1 block font-medium">Data emiterii</label>
                <input type="date" value={form.emis} onChange={e => setForm({...form, emis: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
              </div>
              <div>
                <label className="text-xs text-gray-500 mb-1 block font-medium">Data expirării *</label>
                <input type="date" value={form.expira} onChange={e => setForm({...form, expira: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
              </div>
              <input value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} placeholder="Notă (ex: asigurător, nr. poliță...)" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
            </div>
            <button onClick={adauga} className="mt-5 w-full bg-blue-600 text-white py-3 rounded-xl font-semibold text-sm">Adaugă documentul</button>
          </div>
        </div>
      )}
    </div>
  );
}

                  <div>
                    <label className="text-xs text-gray-500 mb-1 block font-medium">Cost total (lei)</label>
                    <input value={form.cost} onChange={e => setForm({...form, cost: e.target.value})} placeholder="ex: 450" type="number" className="border border-gray-200 rounded-xl p-3 text-sm w-full" />
                  </div>
                </div>

                {/* Checklist revizii */}
                <div>
                  <label className="text-xs text-gray-500 mb-2 block font-medium uppercase tracking-wide">✅ Lucrări efectuate</label>
                  {REVIZII.map(sectiune => (
                    <div key={sectiune.cat} className="mb-3">
                      <div className="text-xs font-semibold text-gray-500 mb-1.5">{sectiune.cat}</div>
                      <div className="bg-gray-50 rounded-xl overflow-hidden">
                        {sectiune.items.map((item, i) => (
                          <button key={item} onClick={() => toggleBifa(item)}
                            className={`w-full flex items-center gap-3 px-4 py-3 text-sm text-left transition-colors ${i > 0 ? 'border-t border-gray-100' : ''} ${bifate.includes(item) ? 'bg-blue-50' : ''}`}>
                            <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0 transition-all ${bifate.includes(item) ? 'bg-blue-600 border-blue-600' : 'border-gray-300'}`}>
                              {bifate.includes(item) && <span className="text-white text-xs font-bold">✓</span>}
                            </div>
                            <span className={bifate.includes(item) ? 'text-blue-700 font-medium' : 'text-gray-700'}>{item}</span>
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                {/* Alte lucrari */}
                <div>
                  <label className="text-xs text-gray-500 mb-1 block font-medium">📝 Alte lucrări (opțional)</label>
                  <textarea value={form.altele||''} onChange={e => setForm({...form, altele: e.target.value})} placeholder="ex: Reglaj geometrie, Schimb brat directie..." rows={3} className="w-full border border-gray-200 rounded-xl p-3 text-sm resize-none" />
                </div>

                {/* Nota */}
                <div>
                  <label className="text-xs text-gray-500 mb-1 block font-medium">Notă</label>
                  <input value={form.nota} onChange={e => setForm({...form, nota: e.target.value})} placeholder="ex: Service Dacia Cluj, garantie 6 luni" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
                </div>

                {/* Sumar bifate */}
                {bifate.length > 0 && (
                  <div className="bg-blue-50 rounded-xl p-3">
                    <div className="text-xs font-semibold text-blue-600 mb-1">{bifate.length} lucrări selectate:</div>
                    <div className="text-xs text-blue-700">{bifate.join(' · ')}</div>
                  </div>
                )}
              </div>

              <button onClick={() => {
                if (!form.carId || !form.data) return;
                const desc = [...(form.bifate||[]), ...(form.altele ? [form.altele] : [])].join(', ') || 'Service general';
                setServices([...services, { id: Date.now(), carId: parseInt(form.carId), data: form.data, descriere: desc, km: parseInt(form.km)||0, cost: parseFloat(form.cost)||0, piese: (form.bifate||[]).join(', '), altele: form.altele||'', nota: form.nota||'' }]);
                setForm({ carId:'', data:'', descriere:'', km:'', cost:'', nota:'', piese:'', bifate:[], altele:'' });
                setModal(false);
              }} disabled={!form.carId || !form.data} className="mt-5 w-full bg-blue-600 disabled:bg-gray-200 disabled:text-gray-400 text-white py-3.5 rounded-xl font-semibold text-sm">
                Salvează service
              </button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── Remindere ─────────────────────────────────────────────────────────────────
function Remindere({ cars, docs, services, reminderSettings, setReminderSettings }) {
  const [view, setView] = useState('lista');
  const [calDate, setCalDate] = useState(new Date());
  const [notifPerm, setNotifPerm] = useState(typeof Notification !== 'undefined' ? Notification.permission : 'unsupported');

  const ZILE_INAINTE = [30, 14, 7, 3, 1];
  const OIL_INTERVALS = [5000, 7500, 10000, 15000, 20000];

  function cerePermisiune() {
    if (typeof Notification === 'undefined') return;
    Notification.requestPermission().then(p => {
      setNotifPerm(p);
      if (p === 'granted') new Notification('AutoCare 🚗', { body: 'Notificările sunt activate! Vei fi alertat înainte de expirări.' });
    });
  }

  // Genereaza toate evenimentele viitoare
  function getEvenimente() {
    const ev = [];
    // Documente
    docs.forEach(d => {
      const car = cars.find(c => c.id === d.carId);
      const zile = zilePanaLa(d.expira);
      ev.push({ id: `doc-${d.id}`, tip: 'document', titlu: d.tip, subtitlu: `${car?.marca} ${car?.model} · ${car?.numar}`, data: d.expira, zile, icon: DOC_ICONS[d.tip] || '📄', carId: d.carId });
    });
    // Revizie anuala (ITP-based)
    cars.forEach(car => {
      const itpDoc = docs.filter(d => d.carId === car.id && d.tip === 'ITP').sort((a,b) => new Date(b.expira) - new Date(a.expira))[0];
      if (!itpDoc) {
        ev.push({ id: `rev-${car.id}`, tip: 'revizie', titlu: 'Revizie anuală', subtitlu: `${car.marca} ${car.model} · ${car.numar}`, data: null, zile: null, icon: '📋', carId: car.id, fara_data: true });
      }
    });
    // Schimb ulei pe km
    cars.forEach(car => {
      const interval = reminderSettings?.oilInterval?.[car.id];
      if (!interval || !car.km) return;
      const ultimulOlei = services.filter(s => s.carId === car.id && s.piese && s.piese.toLowerCase().includes('ulei')).sort((a,b) => b.km - a.km)[0];
      const bazaKm = ultimulOlei ? ultimulOlei.km : 0;
      const urmatorul = bazaKm + interval;
      const kmRamasi = urmatorul - car.km;
      ev.push({ id: `oil-${car.id}`, tip: 'ulei', titlu: 'Schimb ulei motor', subtitlu: `${car.marca} ${car.model} · la ${urmatorul.toLocaleString()} km`, data: null, zile: null, kmRamasi, icon: '🛢️', carId: car.id, urmatorul, km: car.km });
    });
    return ev.sort((a,b) => {
      if (a.data && b.data) return new Date(a.data) - new Date(b.data);
      if (a.data) return -1;
      if (b.data) return 1;
      if (a.kmRamasi !== undefined && b.kmRamasi !== undefined) return a.kmRamasi - b.kmRamasi;
      return 0;
    });
  }

  const evenimente = getEvenimente();

  // Calendar
  const azi = new Date();
  const primaZi = new Date(calDate.getFullYear(), calDate.getMonth(), 1);
  const ultimaZi = new Date(calDate.getFullYear(), calDate.getMonth() + 1, 0);
  const ziStart = primaZi.getDay() === 0 ? 6 : primaZi.getDay() - 1;
  const zileCalendar = [];
  for (let i = 0; i < ziStart; i++) zileCalendar.push(null);
  for (let i = 1; i <= ultimaZi.getDate(); i++) zileCalendar.push(i);

  function evPeZi(zi) {
    if (!zi) return [];
    const d = new Date(calDate.getFullYear(), calDate.getMonth(), zi);
    const dStr = d.toISOString().split('T')[0];
    return evenimente.filter(e => e.data === dStr);
  }

  function getLunaStr(d) {
    return d.toLocaleDateString('ro-RO', { month: 'long', year: 'numeric' });
  }

  function getBadgeOil(kmRamasi) {
    if (kmRamasi <= 0) return 'badge-red';
    if (kmRamasi <= 1500) return 'badge-yellow';
    return 'badge-green';
  }

  return (
    <div className="content p-4">
      <div className="pt-2 mb-4">
        <h1 className="text-xl font-bold text-gray-800">📅 Remindere</h1>
      </div>

      {/* Banner notificari */}
      {notifPerm === 'default' && (
        <div className="bg-blue-50 border border-blue-200 rounded-2xl p-4 mb-4 flex items-center gap-3">
          <div className="text-2xl">🔔</div>
          <div className="flex-1">
            <div className="text-sm font-semibold text-blue-800">Activează notificările</div>
            <div className="text-xs text-blue-600">Primești alerte înainte de expirări</div>
          </div>
          <button onClick={cerePermisiune} className="bg-blue-600 text-white text-xs font-semibold px-3 py-2 rounded-xl">Activează</button>
        </div>
      )}
      {notifPerm === 'granted' && (
        <div className="bg-green-50 border border-green-200 rounded-2xl p-3 mb-4 flex items-center gap-2">
          <span className="text-green-600">✓</span>
          <span className="text-sm text-green-700 font-medium">Notificările sunt active</span>
        </div>
      )}
      {notifPerm === 'denied' && (
        <div className="bg-red-50 border border-red-200 rounded-2xl p-3 mb-4">
          <span className="text-xs text-red-600">Notificările sunt blocate. Activează-le din setările browser-ului.</span>
        </div>
      )}

      {/* Toggle lista/calendar */}
      <div className="flex bg-gray-100 rounded-2xl p-1 mb-4">
        <button onClick={() => setView('lista')} className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${view === 'lista' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>📋 Listă</button>
        <button onClick={() => setView('calendar')} className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${view === 'calendar' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>📅 Calendar</button>
      </div>

      {/* LISTA */}
      {view === 'lista' && (
        <div>
          {/* Setari intervale notificare */}
          <div className="card p-4 mb-4">
            <div className="text-sm font-semibold text-gray-700 mb-3">⚙️ Alertă cu ... zile înainte</div>
            <div className="flex flex-wrap gap-2">
              {ZILE_INAINTE.map(z => {
                const activ = reminderSettings?.zile?.includes(z) ?? (z === 30 || z === 7);
                return (
                  <button key={z} onClick={() => {
                    const cur = reminderSettings?.zile || [30, 7];
                    const nou = activ ? cur.filter(x => x !== z) : [...cur, z];
                    setReminderSettings({...reminderSettings, zile: nou});
                  }} className={`px-3 py-1.5 rounded-xl text-sm font-semibold border-2 transition-all ${activ ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-500 border-gray-200'}`}>
                    {z} {z === 1 ? 'zi' : 'zile'}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Interval schimb ulei per masina */}
          {cars.length > 0 && (
            <div className="card p-4 mb-4">
              <div className="text-sm font-semibold text-gray-700 mb-3">🛢️ Interval schimb ulei</div>
              {cars.map(car => (
                <div key={car.id} className="flex items-center justify-between mb-2">
                  <div className="text-sm text-gray-700">{car.marca} {car.model}</div>
                  <select value={reminderSettings?.oilInterval?.[car.id] || ''} onChange={e => setReminderSettings({...reminderSettings, oilInterval: {...reminderSettings?.oilInterval, [car.id]: parseInt(e.target.value) || null}})}
                    className="border border-gray-200 rounded-xl p-2 text-xs bg-white w-32">
                    <option value="">Fără</option>
                    {OIL_INTERVALS.map(k => <option key={k} value={k}>la {k.toLocaleString()} km</option>)}
                  </select>
                </div>
              ))}
            </div>
          )}

          {/* Lista evenimente */}
          <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Toate scadențele</div>
          {evenimente.length === 0 ? (
            <div className="card p-8 text-center text-gray-400">
              <div className="text-4xl mb-2">🎉</div>
              <p className="text-sm">Totul e în regulă! Nicio scadență.</p>
            </div>
          ) : evenimente.map(ev => {
            let badge = null;
            let extra = null;
            if (ev.data) {
              const st = statusDoc(ev.data);
              badge = <span className={`text-xs font-semibold px-2 py-1 rounded-full ${st.cls}`}>{st.label}</span>;
            } else if (ev.kmRamasi !== undefined) {
              badge = <span className={`text-xs font-semibold px-2 py-1 rounded-full ${getBadgeOil(ev.kmRamasi)}`}>{ev.kmRamasi > 0 ? `${ev.kmRamasi.toLocaleString()} km` : 'Depășit'}</span>;
              extra = <div className="text-xs text-gray-400 mt-0.5">Actual: {ev.km?.toLocaleString()} km · Următor: {ev.urmatorul?.toLocaleString()} km</div>;
            } else if (ev.fara_data) {
              badge = <span className="badge-yellow text-xs font-semibold px-2 py-1 rounded-full">Fără ITP</span>;
            }
            return (
              <div key={ev.id} className="card p-3 mb-2 flex items-center gap-3">
                <div className="text-2xl w-8 text-center">{ev.icon}</div>
                <div className="flex-1">
                  <div className="font-medium text-gray-800 text-sm">{ev.titlu}</div>
                  <div className="text-xs text-gray-500">{ev.subtitlu}</div>
                  {ev.data && <div className="text-xs text-gray-400">Expiră: {formatDate(ev.data)}</div>}
                  {extra}
                </div>
                {badge}
              </div>
            );
          })}
        </div>
      )}

      {/* CALENDAR */}
      {view === 'calendar' && (
        <div>
          {/* Navigare luna */}
          <div className="flex items-center justify-between mb-4">
            <button onClick={() => setCalDate(new Date(calDate.getFullYear(), calDate.getMonth()-1, 1))} className="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 font-bold">‹</button>
            <div className="font-semibold text-gray-800 capitalize">{getLunaStr(calDate)}</div>
            <button onClick={() => setCalDate(new Date(calDate.getFullYear(), calDate.getMonth()+1, 1))} className="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 font-bold">›</button>
          </div>

          {/* Zile saptamana */}
          <div className="grid grid-cols-7 mb-1">
            {['L','M','M','J','V','S','D'].map((z,i) => (
              <div key={i} className="text-center text-xs font-semibold text-gray-400 py-1">{z}</div>
            ))}
          </div>

          {/* Grid zile */}
          <div className="grid grid-cols-7 gap-0.5">
            {zileCalendar.map((zi, i) => {
              if (!zi) return <div key={i} />;
              const evZi = evPeZi(zi);
              const esteAzi = zi === azi.getDate() && calDate.getMonth() === azi.getMonth() && calDate.getFullYear() === azi.getFullYear();
              const areExpirirat = evZi.some(e => e.zile < 0);
              const areUrgent = evZi.some(e => e.zile >= 0 && e.zile <= 7);
              const areViitor = evZi.some(e => e.zile > 7);
              return (
                <div key={i} className={`aspect-square flex flex-col items-center justify-center rounded-xl cursor-default ${esteAzi ? 'bg-blue-600 text-white' : ''}`}>
                  <div className={`text-sm font-medium ${esteAzi ? 'text-white' : 'text-gray-700'}`}>{zi}</div>
                  {evZi.length > 0 && (
                    <div className="flex gap-0.5 mt-0.5">
                      {areExpirirat && <div className="w-1.5 h-1.5 rounded-full bg-red-500" />}
                      {areUrgent && <div className="w-1.5 h-1.5 rounded-full bg-yellow-400" />}
                      {areViitor && <div className="w-1.5 h-1.5 rounded-full bg-green-400" />}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Legenda */}
          <div className="flex gap-4 justify-center mt-3 mb-4">
            <div className="flex items-center gap-1 text-xs text-gray-500"><div className="w-2 h-2 rounded-full bg-red-500"/>Expirat</div>
            <div className="flex items-center gap-1 text-xs text-gray-500"><div className="w-2 h-2 rounded-full bg-yellow-400"/>Urgent</div>
            <div className="flex items-center gap-1 text-xs text-gray-500"><div className="w-2 h-2 rounded-full bg-green-400"/>Viitor</div>
          </div>

          {/* Evenimente luna curenta */}
          <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Evenimente în {calDate.toLocaleDateString('ro-RO', {month: 'long'})}</div>
          {evenimente.filter(e => e.data && new Date(e.data).getMonth() === calDate.getMonth() && new Date(e.data).getFullYear() === calDate.getFullYear()).length === 0
            ? <div className="card p-4 text-center text-gray-400 text-sm">Niciun eveniment în această lună</div>
            : evenimente.filter(e => e.data && new Date(e.data).getMonth() === calDate.getMonth() && new Date(e.data).getFullYear() === calDate.getFullYear()).map(ev => {
              const st = statusDoc(ev.data);
              return (
                <div key={ev.id} className="card p-3 mb-2 flex items-center gap-3">
                  <div className="text-xl">{ev.icon}</div>
                  <div className="flex-1">
                    <div className="font-medium text-gray-800 text-sm">{ev.titlu}</div>
                    <div className="text-xs text-gray-500">{ev.subtitlu} · {formatDate(ev.data)}</div>
                  </div>
                  <span className={`text-xs font-semibold px-2 py-1 rounded-full ${st.cls}`}>{st.label}</span>
                </div>
              );
            })
          }
        </div>
      )}
    </div>
  );
}

// ── Finante ───────────────────────────────────────────────────────────────────
function Finante({ cars, services, plinuri, setPlinuri }) {
  const [subtab, setSubtab] = useState('costuri');
  const [anSelectat, setAnSelectat] = useState(new Date().getFullYear());
  const [carSelectat, setCarSelectat] = useState('toate');
  const [modalPlin, setModalPlin] = useState(false);
  const [formPlin, setFormPlin] = useState({ carId:'', data:'', litri:'', pretTotal:'', pretLitru:'', km:'', statie:'' });

  const LUNI_SCURT = ['Ian','Feb','Mar','Apr','Mai','Iun','Iul','Aug','Sep','Oct','Nov','Dec'];
  const aniDisponibili = [...new Set([new Date().getFullYear(), ...services.map(s => new Date(s.data).getFullYear())])].sort((a,b) => b-a);

  // ── COSTURI ──
  const svcFiltrate = services.filter(s => {
    const anS = new Date(s.data).getFullYear();
    if (anS !== anSelectat) return false;
    if (carSelectat !== 'toate' && s.carId !== parseInt(carSelectat)) return false;
    return true;
  });

  const totalAn = svcFiltrate.reduce((sum, s) => sum + (s.cost||0), 0);

  const costPerCar = cars.map(car => ({
    car,
    total: services.filter(s => new Date(s.data).getFullYear() === anSelectat && s.carId === car.id).reduce((sum,s) => sum+(s.cost||0), 0),
    count: services.filter(s => new Date(s.data).getFullYear() === anSelectat && s.carId === car.id).length,
  }));

  const costPerLuna = LUNI_SCURT.map((_, i) =>
    svcFiltrate.filter(s => new Date(s.data).getMonth() === i).reduce((sum,s) => sum+(s.cost||0), 0)
  );
  const maxLuna = Math.max(...costPerLuna, 1);

  // cost/km per masina
  function costPeKm(car) {
    const svcCar = services.filter(s => s.carId === car.id);
    const totalCost = svcCar.reduce((sum,s) => sum+(s.cost||0), 0);
    if (!car.km || car.km === 0 || totalCost === 0) return null;
    return (totalCost / car.km).toFixed(2);
  }

  // ── CONSUM ──
  function adaugaPlin() {
    if (!formPlin.carId || !formPlin.data || !formPlin.litri || !formPlin.km) return;
    const pretL = formPlin.pretLitru ? parseFloat(formPlin.pretLitru) : formPlin.pretTotal ? (parseFloat(formPlin.pretTotal)/parseFloat(formPlin.litri)) : 0;
    const nou = { id: Date.now(), ...formPlin, carId: parseInt(formPlin.carId), litri: parseFloat(formPlin.litri), km: parseInt(formPlin.km), pretLitru: pretL, pretTotal: pretL * parseFloat(formPlin.litri) };
    setPlinuri([...plinuri, nou]);
    setFormPlin({ carId:'', data:'', litri:'', pretTotal:'', pretLitru:'', km:'', statie:'' });
    setModalPlin(false);
  }

  function consumMediu(carId) {
    const pl = plinuri.filter(p => p.carId === carId).sort((a,b) => a.km - b.km);
    if (pl.length < 2) return null;
    const distanta = pl[pl.length-1].km - pl[0].km;
    const litriTotal = pl.slice(1).reduce((sum,p) => sum+p.litri, 0);
    if (distanta === 0) return null;
    return (litriTotal/distanta*100).toFixed(1);
  }

  function costMediu100km(carId) {
    const pl = plinuri.filter(p => p.carId === carId).sort((a,b) => a.km - b.km);
    if (pl.length < 2) return null;
    const distanta = pl[pl.length-1].km - pl[0].km;
    const costTotal = pl.slice(1).reduce((sum,p) => sum+p.pretTotal, 0);
    if (distanta === 0) return null;
    return (costTotal/distanta*100).toFixed(0);
  }

  const plinuriSortate = [...plinuri].sort((a,b) => new Date(b.data) - new Date(a.data));

  return (
    <div className="content p-4">
      <div className="pt-2 mb-4"><h1 className="text-xl font-bold text-gray-800">📊 Finanțe</h1></div>

      <div className="flex bg-gray-100 rounded-2xl p-1 mb-4">
        <button onClick={() => setSubtab('costuri')} className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${subtab==='costuri' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>💰 Costuri</button>
        <button onClick={() => setSubtab('consum')} className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${subtab==='consum' ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}`}>⛽ Consum</button>
      </div>

      {/* ── COSTURI ── */}
      {subtab === 'costuri' && (
        <div>
          {/* Filtre */}
          <div className="flex gap-2 mb-4">
            <select value={anSelectat} onChange={e => setAnSelectat(parseInt(e.target.value))} className="border border-gray-200 rounded-xl p-2.5 text-sm bg-white flex-1">
              {aniDisponibili.map(a => <option key={a} value={a}>{a}</option>)}
            </select>
            <select value={carSelectat} onChange={e => setCarSelectat(e.target.value)} className="border border-gray-200 rounded-xl p-2.5 text-sm bg-white flex-1">
              <option value="toate">Toate mașinile</option>
              {cars.map(c => <option key={c.id} value={c.id}>{c.marca} {c.model}</option>)}
            </select>
          </div>

          {/* Total an */}
          <div className="bg-blue-600 rounded-2xl p-5 mb-4 text-white text-center">
            <div className="text-xs opacity-75 mb-1">Total cheltuieli {anSelectat}</div>
            <div className="text-4xl font-bold">{totalAn.toLocaleString()} lei</div>
            <div className="text-xs opacity-75 mt-1">{svcFiltrate.length} intervenții</div>
          </div>

          {/* Per masina */}
          {cars.length > 1 && (
            <div className="card p-4 mb-4">
              <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Pe mașină</div>
              {costPerCar.map(({car, total, count}) => (
                <div key={car.id} className="mb-3 last:mb-0">
                  <div className="flex justify-between text-sm mb-1">
                    <span className="font-medium text-gray-700">{car.marca} {car.model}</span>
                    <span className="font-bold text-gray-800">{total.toLocaleString()} lei</span>
                  </div>
                  <div className="w-full bg-gray-100 rounded-full h-2">
                    <div className="bg-blue-500 h-2 rounded-full" style={{width: totalAn > 0 ? `${(total/Math.max(...costPerCar.map(x=>x.total),1))*100}%` : '0%'}} />
                  </div>
                  <div className="text-xs text-gray-400 mt-0.5">{count} intervenții</div>
                </div>
              ))}
            </div>
          )}

          {/* Grafic lunar */}
          <div className="card p-4 mb-4">
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Lunar — {anSelectat}</div>
            <div className="flex items-end gap-1 h-28">
              {costPerLuna.map((val, i) => (
                <div key={i} className="flex-1 flex flex-col items-center gap-1">
                  <div className="text-xs text-gray-500 font-medium" style={{fontSize:'9px'}}>{val > 0 ? val : ''}</div>
                  <div className="w-full rounded-t-md transition-all" style={{height: `${Math.max((val/maxLuna)*80, val>0?6:0)}px`, background: val>0 ? '#2563EB' : '#E5E7EB'}} />
                  <div className="text-gray-400" style={{fontSize:'9px'}}>{LUNI_SCURT[i]}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Cost pe km */}
          <div className="card p-4 mb-4">
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Cost per kilometru</div>
            {cars.map(car => {
              const cpk = costPeKm(car);
              return (
                <div key={car.id} className="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                  <div>
                    <div className="text-sm font-medium text-gray-700">{car.marca} {car.model}</div>
                    <div className="text-xs text-gray-400">{car.km?.toLocaleString()} km total</div>
                  </div>
                  <div className="text-right">
                    {cpk ? <div className="font-bold text-blue-600">{cpk} lei/km</div> : <div className="text-xs text-gray-400">Insuficiente date</div>}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Lista servicii */}
          {svcFiltrate.length > 0 && (
            <div className="card p-4">
              <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Detaliu intervenții</div>
              {[...svcFiltrate].sort((a,b) => new Date(b.data)-new Date(a.data)).map(s => {
                const car = cars.find(c => c.id === s.carId);
                return (
                  <div key={s.id} className="flex justify-between items-center py-2 border-b border-gray-50 last:border-0">
                    <div>
                      <div className="text-sm text-gray-700 font-medium">{s.descriere?.substring(0,35)}{s.descriere?.length>35?'...':''}</div>
                      <div className="text-xs text-gray-400">{car?.marca} {car?.model} · {formatDate(s.data)}</div>
                    </div>
                    <div className="font-semibold text-gray-800 text-sm">{s.cost} lei</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── CONSUM ── */}
      {subtab === 'consum' && (
        <div>
          <div className="flex justify-end mb-3">
            <button onClick={() => setModalPlin(true)} disabled={cars.length===0} className="bg-blue-600 disabled:bg-gray-200 text-white text-sm font-semibold px-4 py-2 rounded-xl">+ Adaugă plin</button>
          </div>

          {/* Sumar consum per masina */}
          {cars.map(car => {
            const cm = consumMediu(car.id);
            const cost100 = costMediu100km(car.id);
            const nrPlinuri = plinuri.filter(p => p.carId === car.id).length;
            const totalCheltuiti = plinuri.filter(p => p.carId === car.id).reduce((sum,p) => sum+p.pretTotal, 0);
            return (
              <div key={car.id} className="card p-4 mb-3">
                <div className="font-bold text-gray-800 mb-3">{car.marca} {car.model} <span className="font-normal text-gray-400 text-sm">· {car.numar}</span></div>
                <div className="grid grid-cols-3 gap-2 mb-2">
                  <div className="bg-blue-50 rounded-xl p-3 text-center">
                    <div className="text-xs text-blue-500 mb-1">Consum mediu</div>
                    <div className="font-bold text-blue-700">{cm ? `${cm} l/100` : '—'}</div>
                  </div>
                  <div className="bg-green-50 rounded-xl p-3 text-center">
                    <div className="text-xs text-green-500 mb-1">Cost /100km</div>
                    <div className="font-bold text-green-700">{cost100 ? `${cost100} lei` : '—'}</div>
                  </div>
                  <div className="bg-orange-50 rounded-xl p-3 text-center">
                    <div className="text-xs text-orange-500 mb-1">Total carburant</div>
                    <div className="font-bold text-orange-700">{totalCheltuiti > 0 ? `${totalCheltuiti.toFixed(0)} lei` : '—'}</div>
                  </div>
                </div>
                <div className="text-xs text-gray-400 text-center">{nrPlinuri} plinuri înregistrate</div>
              </div>
            );
          })}

          {/* Lista plinuri */}
          {plinuriSortate.length === 0 ? (
            <div className="card p-8 text-center text-gray-400">
              <div className="text-4xl mb-2">⛽</div>
              <p className="text-sm mb-3">Nu ai înregistrat niciun plin</p>
              {cars.length > 0 && <button onClick={() => setModalPlin(true)} className="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-semibold">Adaugă primul plin</button>}
            </div>
          ) : (
            <div className="card p-4">
              <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Istoric plinuri</div>
              {plinuriSortate.map(p => {
                const car = cars.find(c => c.id === p.carId);
                return (
                  <div key={p.id} className="flex items-center gap-3 py-2.5 border-b border-gray-50 last:border-0">
                    <div className="text-2xl">⛽</div>
                    <div className="flex-1">
                      <div className="text-sm font-medium text-gray-800">{p.litri} litri · {p.km?.toLocaleString()} km</div>
                      <div className="text-xs text-gray-400">{car?.marca} {car?.model} · {formatDate(p.data)}{p.statie ? ` · ${p.statie}` : ''}</div>
                    </div>
                    <div className="text-right">
                      <div className="text-sm font-bold text-gray-800">{p.pretTotal.toFixed(2)} lei</div>
                      <div className="text-xs text-gray-400">{p.pretLitru?.toFixed(2)} lei/l</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Modal plin */}
          {modalPlin && (
            <div className="modal-overlay" onClick={() => setModalPlin(false)}>
              <div className="modal-box" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between mb-5">
                  <h2 className="text-lg font-bold text-gray-800">⛽ Adaugă plin</h2>
                  <button onClick={() => setModalPlin(false)} className="text-gray-400 text-xl">✕</button>
                </div>
                <div className="space-y-3">
                  <div>
                    <label className="text-xs text-gray-500 mb-1 block font-medium">Mașina *</label>
                    <select value={formPlin.carId} onChange={e => setFormPlin({...formPlin, carId: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3 text-sm bg-white">
                      <option value="">Selectează mașina</option>
                      {cars.map(c => <option key={c.id} value={c.id}>{c.marca} {c.model} · {c.numar}</option>)}
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-500 mb-1 block font-medium">Data *</label>
                      <input type="date" value={formPlin.data} onChange={e => setFormPlin({...formPlin, data: e.target.value})} className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 mb-1 block font-medium">Kilometraj *</label>
                      <input type="number" value={formPlin.km} onChange={e => setFormPlin({...formPlin, km: e.target.value})} placeholder="ex: 87500" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-500 mb-1 block font-medium">Litri *</label>
                      <input type="number" step="0.01" value={formPlin.litri} onChange={e => setFormPlin({...formPlin, litri: e.target.value})} placeholder="ex: 45.5" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 mb-1 block font-medium">Preț/litru (lei)</label>
                      <input type="number" step="0.01" value={formPlin.pretLitru} onChange={e => setFormPlin({...formPlin, pretLitru: e.target.value, pretTotal: e.target.value && formPlin.litri ? (parseFloat(e.target.value)*parseFloat(formPlin.litri)).toFixed(2) : formPlin.pretTotal})} placeholder="ex: 7.25" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-500 mb-1 block font-medium">Total plătit (lei)</label>
                      <input type="number" step="0.01" value={formPlin.pretTotal} onChange={e => setFormPlin({...formPlin, pretTotal: e.target.value, pretLitru: e.target.value && formPlin.litri ? (parseFloat(e.target.value)/parseFloat(formPlin.litri)).toFixed(3) : formPlin.pretLitru})} placeholder="ex: 330" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-500 mb-1 block font-medium">Stație</label>
                      <input value={formPlin.statie} onChange={e => setFormPlin({...formPlin, statie: e.target.value})} placeholder="ex: Rompetrol" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
                    </div>
                  </div>
                </div>
                <button onClick={adaugaPlin} disabled={!formPlin.carId||!formPlin.data||!formPlin.litri||!formPlin.km} className="mt-5 w-full bg-blue-600 disabled:bg-gray-200 disabled:text-gray-400 text-white py-3.5 rounded-xl font-semibold text-sm">Salvează plinul</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Profil ────────────────────────────────────────────────────────────────────
function Profil({ user, setUser, onLogout, cars, docs, services, preferences, setPreferences }) {
  const [edit, setEdit] = useState(false);
  const [form, setForm] = useState(user);
  const [sectiune, setSectiune] = useState(null); // 'parola' | 'sterge' | null
  const [formParola, setFormParola] = useState({ curenta:'', noua:'', confirma:'' });
  const [errParola, setErrParola] = useState('');
  const [okParola, setOkParola] = useState(false);
  const [confirmSterge, setConfirmSterge] = useState('');

  function salveaza() {
    const users = loadData('ac_users', []);
    saveData('ac_users', users.map(u => u.email === user.email ? {...u, ...form} : u));
    setUser({...user, ...form});
    setEdit(false);
  }

  function schimbaParola() {
    setErrParola(''); setOkParola(false);
    const users = loadData('ac_users', []);
    const u = users.find(u => u.email === user.email);
    if (u.parola !== formParola.curenta) { setErrParola('Parola curentă este incorectă.'); return; }
    if (formParola.noua.length < 6) { setErrParola('Parola nouă trebuie să aibă minim 6 caractere.'); return; }
    if (formParola.noua !== formParola.confirma) { setErrParola('Parolele noi nu coincid.'); return; }
    saveData('ac_users', users.map(u => u.email === user.email ? {...u, parola: formParola.noua} : u));
    setOkParola(true);
    setFormParola({ curenta:'', noua:'', confirma:'' });
  }

  function stergeContul() {
    if (confirmSterge !== user.email) return;
    const users = loadData('ac_users', []);
    saveData('ac_users', users.filter(u => u.email !== user.email));
    ['cars','docs','svc','rem','plin'].forEach(k => localStorage.removeItem(`ac_${k}_${user.email}`));
    saveData('ac_current', null);
    onLogout();
  }

  function toggleDark() {
    const val = !preferences.darkMode;
    setPreferences({...preferences, darkMode: val});
    document.body.classList.toggle('dark', val);
  }

  function exportCSV(tip) {
    let continut = '', numeFisier = '';
    if (tip === 'service') {
      numeFisier = 'service_autocare.csv';
      continut = 'Masina,Data,Descriere,Kilometraj,Cost,Nota\n' +
        services.map(s => {
          const car = cars.find(c => c.id === s.carId);
          return `"${car?.marca} ${car?.model} ${car?.numar}","${s.data}","${s.descriere}","${s.km}","${s.cost}","${s.nota||''}"`;
        }).join('\n');
    } else if (tip === 'documente') {
      numeFisier = 'documente_autocare.csv';
      continut = 'Masina,Tip Document,Data Emitere,Data Expirare,Nota\n' +
        docs.map(d => {
          const car = cars.find(c => c.id === d.carId);
          return `"${car?.marca} ${car?.model} ${car?.numar}","${d.tip}","${d.emis||''}","${d.expira}","${d.nota||''}"`;
        }).join('\n');
    } else if (tip === 'masini') {
      numeFisier = 'masini_autocare.csv';
      continut = 'Marca,Model,An,Nr Inmatriculare,Kilometraj,Combustibil\n' +
        cars.map(c => `"${c.marca}","${c.model}","${c.an}","${c.numar}","${c.km}","${c.combustibil}"`).join('\n');
    } else if (tip === 'backup') {
      numeFisier = 'backup_autocare.json';
      continut = JSON.stringify({ user: {nume: user.nume, email: user.email}, cars, docs, services }, null, 2);
    }
    const blob = new Blob(['﻿' + continut], { type: tip === 'backup' ? 'application/json' : 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = numeFisier; a.click();
    URL.revokeObjectURL(url);
  }

  const Row = ({ label, value }) => (
    <div className="flex justify-between py-2.5 border-b border-gray-50 last:border-0 text-sm">
      <span className="text-gray-500">{label}</span>
      <span className="font-medium text-gray-800">{value}</span>
    </div>
  );

  const SectionHeader = ({ title }) => (
    <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mt-5 mb-2">{title}</div>
  );

  const ActionRow = ({ icon, label, sub, onClick, danger }) => (
    <button onClick={onClick} className={`w-full flex items-center gap-3 py-3 border-b border-gray-50 last:border-0 text-left ${danger ? 'text-red-500' : ''}`}>
      <span className="text-xl w-8 text-center">{icon}</span>
      <div className="flex-1">
        <div className={`text-sm font-medium ${danger ? 'text-red-500' : 'text-gray-800'}`}>{label}</div>
        {sub && <div className="text-xs text-gray-400">{sub}</div>}
      </div>
      <span className="text-gray-300">›</span>
    </button>
  );

  return (
    <div className="content p-4">
      <div className="pt-2 mb-4"><h1 className="text-xl font-bold text-gray-800">👤 Profilul meu</h1></div>

      {/* Avatar + info */}
      <div className="card p-5 mb-1 text-center">
        <div className="w-20 h-20 rounded-full bg-blue-600 flex items-center justify-center text-white text-3xl font-bold mx-auto mb-3">
          {user.nume[0].toUpperCase()}
        </div>
        <div className="font-bold text-gray-800 text-lg">{user.nume}</div>
        <div className="text-sm text-gray-500">{user.email}</div>
      </div>

      {/* Date personale */}
      {edit ? (
        <div className="card p-4 mb-1">
          <div className="space-y-3">
            <input value={form.nume} onChange={e => setForm({...form, nume: e.target.value})} placeholder="Nume complet" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
            <input value={form.telefon||''} onChange={e => setForm({...form, telefon: e.target.value})} placeholder="Telefon" type="tel" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
          </div>
          <div className="flex gap-3 mt-4">
            <button onClick={() => setEdit(false)} className="flex-1 border border-gray-200 py-2.5 rounded-xl text-sm font-medium text-gray-600">Anulează</button>
            <button onClick={salveaza} className="flex-1 bg-blue-600 text-white py-2.5 rounded-xl text-sm font-semibold">Salvează</button>
          </div>
        </div>
      ) : (
        <div className="card p-4 mb-1">
          <Row label="Nume" value={user.nume} />
          <Row label="Email" value={user.email} />
          <Row label="Telefon" value={user.telefon || '—'} />
          <button onClick={() => { setForm(user); setEdit(true); }} className="w-full border border-blue-600 text-blue-600 py-2.5 rounded-xl text-sm font-semibold mt-3">Editează profilul</button>
        </div>
      )}

      {/* Notificari & Preferinte */}
      <SectionHeader title="🔔 Notificări & Preferințe" />
      <div className="card p-4 mb-1">
        <div>
          <label className="text-xs text-gray-500 mb-1 block font-medium">Email pentru remindere</label>
          <input value={preferences.emailNotif || user.email} onChange={e => setPreferences({...preferences, emailNotif: e.target.value})}
            placeholder="email@exemplu.ro" type="email" className="w-full border border-gray-200 rounded-xl p-3 text-sm mb-3" />
        </div>
        {[
          { key:'notif30', label:'Alertă la 30 de zile înainte' },
          { key:'notif7',  label:'Alertă la 7 zile înainte' },
          { key:'notif1',  label:'Alertă cu 1 zi înainte' },
        ].map(item => (
          <div key={item.key} className="flex justify-between items-center py-2.5 border-t border-gray-50">
            <span className="text-sm text-gray-700">{item.label}</span>
            <button onClick={() => setPreferences({...preferences, [item.key]: !preferences[item.key]})}
              className={`w-12 h-6 rounded-full transition-colors relative ${preferences[item.key] !== false ? 'bg-blue-600' : 'bg-gray-200'}`}>
              <div className={`w-5 h-5 bg-white rounded-full shadow absolute top-0.5 transition-all ${preferences[item.key] !== false ? 'left-6' : 'left-0.5'}`} />
            </button>
          </div>
        ))}
        <div className="flex justify-between items-center py-2.5 border-t border-gray-50">
          <div>
            <div className="text-sm text-gray-700">🌙 Mod întunecat</div>
            <div className="text-xs text-gray-400">Temă dark pentru aplicație</div>
          </div>
          <button onClick={toggleDark} className={`w-12 h-6 rounded-full transition-colors relative ${preferences.darkMode ? 'bg-blue-600' : 'bg-gray-200'}`}>
            <div className={`w-5 h-5 bg-white rounded-full shadow absolute top-0.5 transition-all ${preferences.darkMode ? 'left-6' : 'left-0.5'}`} />
          </button>
        </div>
      </div>

      {/* Securitate */}
      <SectionHeader title="🔐 Securitate cont" />
      <div className="card p-4 mb-1">
        <ActionRow icon="🔑" label="Schimbă parola" sub="Actualizează parola contului" onClick={() => setSectiune(sectiune === 'parola' ? null : 'parola')} />
        {sectiune === 'parola' && (
          <div className="pt-3 space-y-2">
            {errParola && <div className="bg-red-50 text-red-600 text-xs p-3 rounded-xl">{errParola}</div>}
            {okParola && <div className="bg-green-50 text-green-600 text-xs p-3 rounded-xl">✓ Parola a fost schimbată cu succes!</div>}
            <input type="password" value={formParola.curenta} onChange={e => setFormParola({...formParola, curenta: e.target.value})} placeholder="Parola curentă" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
            <input type="password" value={formParola.noua} onChange={e => setFormParola({...formParola, noua: e.target.value})} placeholder="Parola nouă" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
            <input type="password" value={formParola.confirma} onChange={e => setFormParola({...formParola, confirma: e.target.value})} placeholder="Confirmă parola nouă" className="w-full border border-gray-200 rounded-xl p-3 text-sm" />
            <button onClick={schimbaParola} className="w-full bg-blue-600 text-white py-2.5 rounded-xl text-sm font-semibold">Salvează parola</button>
          </div>
        )}
        <ActionRow icon="🗑️" label="Șterge contul" sub="Elimină permanent contul și datele" onClick={() => setSectiune(sectiune === 'sterge' ? null : 'sterge')} danger />
        {sectiune === 'sterge' && (
          <div className="pt-3 space-y-2">
            <div className="bg-red-50 border border-red-200 text-red-700 text-xs p-3 rounded-xl">⚠️ Această acțiune este ireversibilă. Toate datele tale vor fi șterse permanent.</div>
            <input value={confirmSterge} onChange={e => setConfirmSterge(e.target.value)} placeholder={`Scrie "${user.email}" pentru confirmare`} className="w-full border border-red-300 rounded-xl p-3 text-sm" />
            <button onClick={stergeContul} disabled={confirmSterge !== user.email} className="w-full bg-red-500 disabled:bg-gray-200 disabled:text-gray-400 text-white py-2.5 rounded-xl text-sm font-semibold">Șterge definitiv contul</button>
          </div>
        )}
      </div>

      {/* Date & Export */}
      <SectionHeader title="📤 Date & Export" />
      <div className="card p-4 mb-4">
        <ActionRow icon="🔩" label="Export istoric service (CSV)" sub={`${services.length} înregistrări`} onClick={() => exportCSV('service')} />
        <ActionRow icon="📄" label="Export documente (CSV)" sub={`${docs.length} documente`} onClick={() => exportCSV('documente')} />
        <ActionRow icon="🚗" label="Export mașini (CSV)" sub={`${cars.length} mașini`} onClick={() => exportCSV('masini')} />
        <ActionRow icon="💾" label="Backup complet (JSON)" sub="Toate datele tale" onClick={() => exportCSV('backup')} />
        <ActionRow icon="🖨️" label="Printează / Salvează PDF" sub="Deschide dialogul de printare" onClick={() => window.print()} />
      </div>

      <button onClick={onLogout} className="w-full border border-red-300 text-red-500 py-3 rounded-xl text-sm font-semibold mb-4">Deconectare</button>
    </div>
  );
}

// ── App principal ─────────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [tab, setTab] = useState('dashboard');
  const [cars, setCars] = useState([]);
  const [docs, setDocs] = useState([]);
  const [services, setServices] = useState([]);
  const [reminderSettings, setReminderSettings] = useState({ zile: [30, 7], oilInterval: {} });
  const [plinuri, setPlinuri] = useState([]);
  const [preferences, setPreferences] = useState({ notif30: true, notif7: true, notif1: false, darkMode: false, emailNotif: '' });

  const [sbUser, setSbUser] = React.useState(null);
  const isLoading = React.useRef(true);

  useEffect(() => {
    sb.auth.getSession().then(({data: {session}}) => {
      if (session?.user) handleAuthUser(session.user);
      else isLoading.current = false;
    });
    const {data: {subscription}} = sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_OUT') {
        setUser(null); setSbUser(null);
        setCars([]); setDocs([]); setServices([]); setPlinuri([]);
        setTab('dashboard');
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  function login(sbU) { handleAuthUser(sbU); }

  async function handleAuthUser(sbU) {
    setSbUser(sbU);
    setUser({email: sbU.email, nume: sbU.user_metadata?.nume || sbU.email.split('@')[0]});
    isLoading.current = true;
    const [carsR, docsR, servR, plinR, prefR] = await Promise.all([
      sb.from('cars').select('*').eq('user_id', sbU.id),
      sb.from('docs').select('*').eq('user_id', sbU.id),
      sb.from('services').select('*').eq('user_id', sbU.id),
      sb.from('plinuri').select('*').eq('user_id', sbU.id),
      sb.from('preferences').select('*').eq('user_id', sbU.id).maybeSingle()
    ]);
    setCars(carsR.data || []);
    setDocs(docsR.data || []);
    setServices(servR.data || []);
    setPlinuri(plinR.data || []);
    if (prefR.data) {
      const s = prefR.data.settings || {};
      setPreferences({notif30:true,notif7:true,notif1:false,darkMode:false,emailNotif:'',...s});
      setReminderSettings(prefR.data.reminder_settings || {zile:[30,7],oilInterval:{}});
      document.body.classList.toggle('dark', s.darkMode || false);
    }
    setTimeout(() => { isLoading.current = false; }, 200);
  }

  async function logout() {
    await sb.auth.signOut();
  }

  const prevCars = React.useRef([]);
  const prevDocs = React.useRef([]);
  const prevServices = React.useRef([]);
  const prevPlinuri = React.useRef([]);

  async function syncTable(table, curr, prev, userId) {
    const toUpsert = curr.filter(c => {
      const p = prev.find(x => x.id === c.id);
      return !p || JSON.stringify(p) !== JSON.stringify(c);
    });
    const toDelete = prev.filter(p => !curr.find(c => c.id === p.id));
    if (toUpsert.length > 0)
      await sb.from(table).upsert(toUpsert.map(x => ({...x, user_id: userId})), {onConflict: 'id'});
    if (toDelete.length > 0)
      await Promise.all(toDelete.map(x => sb.from(table).delete().eq('id', x.id)));
  }

  useEffect(() => {
    if (!sbUser || isLoading.current) return;
    syncTable('cars', cars, prevCars.current, sbUser.id);
    prevCars.current = cars;
  }, [cars]);

  useEffect(() => {
    if (!sbUser || isLoading.current) return;
    syncTable('docs', docs, prevDocs.current, sbUser.id);
    prevDocs.current = docs;
  }, [docs]);

  useEffect(() => {
    if (!sbUser || isLoading.current) return;
    syncTable('services', services, prevServices.current, sbUser.id);
    prevServices.current = services;
  }, [services]);

  useEffect(() => {
    if (!sbUser || isLoading.current) return;
    syncTable('plinuri', plinuri, prevPlinuri.current, sbUser.id);
    prevPlinuri.current = plinuri;
  }, [plinuri]);

  // ── Verificare automata la deschidere + la fiecare ora ──
  useEffect(() => {
    if (!user || !docs.length) return;
    function verificaExpirari() {
      if (typeof Notification === 'undefined' || Notification.permission !== 'granted') return;
      const zilePrag = reminderSettings?.zile || [30, 7];
      const pragMin = Math.max(...zilePrag);
      docs.forEach(doc => {
        const zile = zilePanaLa(doc.expira);
        if (zile < 0 || zile > pragMin) return;
        const car = cars.find(c => c.id === doc.carId);
        const numeDoc = doc.tip;
        const numeMasina = car ? `${car.marca} ${car.model}` : '';
        let mesaj = '';
        if (zile < 0) mesaj = `${numeDoc} a expirat!`;
        else if (zile === 0) mesaj = `${numeDoc} expiră AZI!`;
        else mesaj = `${numeDoc} expiră în ${zile} zile`;
        new Notification(`🚗 AutoCare — ${numeMasina}`, {
          body: mesaj,
          icon: 'icon-app.PNG'
        });
      });
    }
    verificaExpirari();
    const interval = setInterval(verificaExpirari, 60 * 60 * 1000); // la fiecare ora
    return () => clearInterval(interval);
  }, [user, docs, cars, reminderSettings]);
  useEffect(() => {
    if (!sbUser || isLoading.current) return;
    sb.from('preferences').upsert({
      user_id: sbUser.id, settings: preferences,
      reminder_settings: reminderSettings, nume: user?.nume
    }, {onConflict: 'user_id'});
  }, [preferences, reminderSettings]);

  if (!user) return <AuthScreen onLogin={login} />;

  const tabs = [
    { id: 'dashboard',  label: 'Acasă',    icon: '🏠' },
    { id: 'masini',     label: 'Mașini',   icon: '🚗' },
    { id: 'documente',  label: 'Documente', icon: '📄' },
    { id: 'servicii',   label: 'Service',  icon: '🔩' },
    { id: 'finante',    label: 'Finanțe',  icon: '📊' },
    { id: 'remindere',  label: 'Alerte',   icon: '🔔' },
    { id: 'profil',     label: 'Profil',   icon: '👤' },
  ];

  return (
    <div className="app-container">
      <div style={{paddingBottom: 80}}>
        {tab === 'dashboard'  && <Dashboard cars={cars} docs={docs} services={services} user={user} onTab={setTab} />}
        {tab === 'masini'     && <Masini cars={cars} setCars={setCars} docs={docs} setDocs={setDocs} />}
        {tab === 'documente'  && <Documente docs={docs} setDocs={setDocs} cars={cars} />}
        {tab === 'servicii'   && <Servicii services={services} setServices={setServices} cars={cars} />}
        {tab === 'remindere'  && <Remindere cars={cars} docs={docs} services={services} reminderSettings={reminderSettings} setReminderSettings={setReminderSettings} />}
        {tab === 'finante'    && <Finante cars={cars} services={services} plinuri={plinuri} setPlinuri={setPlinuri} />}
        {tab === 'profil'     && <Profil user={user} setUser={setUser} onLogout={logout} cars={cars} docs={docs} services={services} preferences={preferences} setPreferences={setPreferences} />}
      </div>
      <nav className="bottom-nav">
        <div className="flex">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`flex-1 flex flex-col items-center py-2 text-xs font-medium transition-colors ${tab === t.id ? 'text-blue-600' : 'text-gray-400'}`}>
              <span className="text-xl mb-0.5">{t.icon}</span>
              {t.label}
              {tab === t.id && <div className="w-1 h-1 rounded-full bg-blue-600 mt-0.5" />}
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
